<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordle Speed Training</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  h1 {
    font-size: 1.8rem;
    margin-bottom: 0.25rem;
    color: #ffffff;
  }

  .subtitle {
    color: #888;
    font-size: 0.9rem;
    margin-bottom: 1.5rem;
  }

  .hud {
    display: flex;
    gap: 3rem;
    margin-bottom: 2rem;
    font-size: 1.4rem;
    font-weight: 600;
  }

  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .hud-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #888;
    margin-bottom: 0.25rem;
  }

  #timer { color: #4ade80; }
  #timer.warning { color: #facc15; }
  #timer.danger { color: #f87171; }

  #score { color: #facc15; }

  .target-section {
    margin-bottom: 2rem;
    text-align: center;
  }

  .target-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #888;
    margin-bottom: 0.5rem;
  }

  #target-word {
    font-size: 1.6rem;
    font-weight: 700;
    color: #4ade80;
    letter-spacing: 0.15em;
  }

  .grid {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }

  .tile {
    width: 56px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    font-weight: 700;
    text-transform: uppercase;
    border-radius: 8px;
    border: 2px solid #3a3a4e;
    transition: background-color 0.2s, border-color 0.2s;
    user-select: none;
  }

  .tile.grey {
    background-color: #3a3a4e;
    border-color: #3a3a4e;
    color: #aaa;
  }

  .tile.yellow {
    background-color: #b8860b;
    border-color: #b8860b;
    color: #fff;
  }

  .tile.green {
    background-color: #2d6a2e;
    border-color: #2d6a2e;
    color: #fff;
  }

  .input-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
  }

  #guess-input {
    font-size: 1.8rem;
    font-weight: 700;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    padding: 0.5rem 1rem;
    border: 2px solid #3a3a4e;
    border-radius: 8px;
    background: #16213e;
    color: #fff;
    width: 320px;
    outline: none;
  }

  #guess-input:focus {
    border-color: #4ade80;
  }

  #guess-input:disabled {
    opacity: 0.4;
  }

  #feedback {
    font-size: 1.1rem;
    min-height: 1.6rem;
    font-weight: 600;
  }

  #feedback.positive { color: #4ade80; }
  #feedback.negative { color: #f87171; }

  #history {
    margin-top: 2rem;
    width: 100%;
    max-width: 400px;
  }

  .history-entry {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid #2a2a3e;
    font-size: 0.95rem;
  }

  .history-entry .word {
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    min-width: 80px;
  }

  .history-entry .score {
    color: #facc15;
    font-weight: 600;
  }

  .history-entry .round {
    color: #666;
    font-size: 0.8rem;
    min-width: 50px;
  }

  .instructions {
    margin-top: 3rem;
    max-width: 420px;
    text-align: center;
    color: #555;
    font-size: 0.75rem;
    line-height: 1.6;
  }
</style>
</head>
<body>

<h1>Wordle Speed Training</h1>
<p class="subtitle">Guess words close to the target — fast</p>

<div class="hud">
  <div class="hud-item">
    <div class="hud-label">Time</div>
    <div id="timer">20</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">Score</div>
    <div id="score">0</div>
  </div>
</div>

<div class="target-section">
  <div class="target-label">Target word</div>
  <div id="target-word"></div>
</div>

<div class="grid" id="target-grid"></div>

<div class="input-section">
  <input type="text" id="guess-input" maxlength="5" placeholder="GUESS" autocomplete="off" disabled>
  <div id="feedback"></div>
</div>

<div id="history"></div>

<div class="instructions">
  A target word is shown colored against a secret solution.<br>
  Type a 5-letter word — your score is based on how close<br>
  your guess is to the target word. Be fast!
</div>

const DICTIONARY = "ABACK,ABASE,ABATE"

const WORDS = [];

function loadWords(text) {
  const lines = text.split('\n').map(l => l.trim().toUpperCase()).filter(l => l.length === 5);
  WORDS.push(...new Set(lines));
}

let solution = '';
let target = '';
let score = 0;
let timer = 20;
let timerInterval = null;
let guessCount = 0;
let round = 0;
let active = false;
let history = [];

const timerEl = document.getElementById('timer');
const scoreEl = document.getElementById('score');
const targetWordEl = document.getElementById('target-word');
const targetGridEl = document.getElementById('target-grid');
const inputEl = document.getElementById('guess-input');
const feedbackEl = document.getElementById('feedback');
const historyEl = document.getElementById('history');

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function colorForLetter(letter, solCounts) {
  if (solCounts[letter] > 0) {
    solCounts[letter]--;
    return 'green';
  }
  return null;
}

function scoreGuess(guess) {
  // Score the guess against the TARGET (first guess) word.
  // Green = exact match at position. Yellow = letter exists in target but wrong position.
  const tCounts = {};
  for (const c of target) tCounts[c] = (tCounts[c] || 0) + 1;

  const greens = new Array(5).fill(false);
  const result = new Array(5).fill(null);

  // First pass: greens
  for (let i = 0; i < 5; i++) {
    if (guess[i] === target[i]) {
      greens[i] = true;
      result[i] = 'green';
      tCounts[guess[i]]--;
    }
  }

  // Second pass: yellows
  for (let i = 0; i < 5; i++) {
    if (greens[i]) continue;
    if (tCounts[guess[i]] > 0) {
      result[i] = 'yellow';
      tCounts[guess[i]]--;
    } else {
      result[i] = 'grey';
    }
  }

  return result;
}

function colorForTarget(letter, solutionWord) {
  const sCounts = {};
  for (const c of solutionWord) sCounts[c] = (sCounts[c] || 0) + 1;

  const greens = new Array(5).fill(false);
  const result = new Array(5).fill(null);

  for (let i = 0; i < 5; i++) {
    if (letter[i] === solutionWord[i]) {
      greens[i] = true;
      result[i] = 'green';
      sCounts[letter[i]]--;
    }
  }

  for (let i = 0; i < 5; i++) {
    if (greens[i]) continue;
    if (sCounts[letter[i]] > 0) {
      result[i] = 'yellow';
      sCounts[letter[i]]--;
    } else {
      result[i] = 'grey';
    }
  }

  return result;
}

function renderTarget() {
  targetGridEl.innerHTML = '';
  const result = colorForTarget(target, solution);
  for (let i = 0; i < 5; i++) {
    const tile = document.createElement('div');
    tile.className = `tile ${result[i]}`;
    tile.textContent = target[i];
    targetGridEl.appendChild(tile);
  }
}

function startRound() {
  solution = pick(WORDS);
  target = pick(WORDS);
  while (target === solution) target = pick(WORDS);
  timer = 20;
  active = true;

  timerEl.textContent = timer;
  timerEl.className = '';
  targetWordEl.textContent = target;
  renderTarget();
  feedbackEl.textContent = '';
  feedbackEl.className = '';
  inputEl.disabled = false;
  inputEl.value = '';
  inputEl.focus();

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timer--;
    timerEl.textContent = timer;
    if (timer <= 5) timerEl.className = 'danger';
    else if (timer <= 10) timerEl.className = 'warning';

    if (timer <= 0) {
      clearInterval(timerInterval);
      inputEl.disabled = true;
      active = false;
      feedbackEl.textContent = 'Time\'s up!';
      feedbackEl.className = 'negative';
      setTimeout(newRound, 1500);
    }
  }, 1000);
}

function submitGuess() {
  if (!active) return;

  const guess = inputEl.value.trim().toUpperCase();
  if (guess.length !== 5) return;
  if (!WORDS.includes(guess)) {
    feedbackEl.textContent = 'Not in dictionary';
    feedbackEl.className = 'negative';
    return;
  }

  guessCount++;
  const result = scoreGuess(guess);
  const matches = result.filter(r => r === 'green' || r === 'yellow').length;
  const points = matches * timer;

  if (points > 0) {
    score += points;
    scoreEl.textContent = score;
    feedbackEl.textContent = `+${points} (${matches} matches x ${timer}s)`;
    feedbackEl.className = 'positive';
  } else {
    feedbackEl.textContent = 'No matches';
    feedbackEl.className = 'negative';
  }

  history.unshift({ round, guess, result, points });
  renderHistory();

  inputEl.disabled = true;
  active = false;
  clearInterval(timerInterval);

  setTimeout(newRound, 1200);
}

function newRound() {
  round++;
  inputEl.disabled = false;
  inputEl.value = '';
  startRound();
}

function renderHistory() {
  historyEl.innerHTML = '';
  history.slice(0, 10).forEach(h => {
    const entry = document.createElement('div');
    entry.className = 'history-entry';
    const tiles = h.result.map((r, i) =>
      `<span style="display:inline-flex;width:24px;height:28px;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;border-radius:3px;color:#fff;background:${r === 'green' ? '#2d6a2e' : r === 'yellow' ? '#b8860b' : '#3a3a4e'}">${h.guess[i]}</span>`
    ).join('');
    entry.innerHTML = `
      <span class="round">#${h.round}</span>
      <span style="display:flex;gap:2px">${tiles}</span>
      <span class="score">${h.points > 0 ? '+' + h.points : '—'}</span>
    `;
    historyEl.appendChild(entry);
  });
}

// Load words from inline data
loadWords(DICTIONARY);
startRound();

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') submitGuess();
});

// Ensure focus stays on input
document.addEventListener('click', () => {
  if (active && !inputEl.disabled) inputEl.focus();
});
</script>
